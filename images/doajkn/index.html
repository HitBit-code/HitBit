<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fireworks Lab v4.0 | Direct Access Only</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, none">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            cursor: crosshair; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            user-select: none; 
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0, 0, 0, 0.85); padding: 18px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #ui b { color: #00d2ff; text-transform: uppercase; letter-spacing: 1px; }
        .controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; }
        button {
            background: linear-gradient(135deg, #ff0055, #ff4d00);
            color: white; border: none; padding: 16px 32px; border-radius: 50px;
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1.5px; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 0, 85, 0.3); pointer-events: auto;
        }
        button:hover { transform: scale(1.08) translateY(-3px); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="ui">
    <b>Fireworks Lab 4.0</b><br>
    <div style="margin-top: 8px; font-size: 13px; opacity: 0.8;">
        Click: Launch | Shift: Burst | Space: Willow<br>
        <span style="color: #00ff88;">FPS Independent Physics (Delta Time)</span>
    </div>
</div>

<div class="controls">
    <button onclick="startDirectorFinale()">Launch Grand Finale</button>
</div>

<canvas id="c"></canvas>

<script>
/** * PERFORMANCE & PHYSICS ENGINE
 * Uses Object Pooling + Delta Time for consistent speed across all monitors.
 */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H, shake = 0, keys = {}, lastTime = 0;
let rockets = [];

const POOL_SIZE = 5000;
const pool = Array.from({length: POOL_SIZE}, () => ({
    active: false, x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0,
    color: '', life: 0, decay: 0, drag: 0, isWillow: false
}));

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize); resize();
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function spawn(x, y, color, count, isWillow) {
    let s = 0;
    for (let i = 0; i < POOL_SIZE && s < count; i++) {
        const p = pool[i];
        if (!p.active) {
            const angle = Math.random() * Math.PI * 2;
            const speed = isWillow ? Math.random() * 6 + 2 : Math.random() * 12 + 4;
            p.active = true; p.x = p.px = x; p.y = p.py = y;
            p.vx = Math.cos(angle) * speed; p.vy = Math.sin(angle) * speed;
            p.color = color; p.life = 1; p.isWillow = isWillow;
            p.decay = isWillow ? Math.random() * 0.007 + 0.003 : Math.random() * 0.025 + 0.01;
            p.drag = isWillow ? 0.988 : 0.95;
            s++;
        }
    }
}

class Rocket {
    constructor(tx, ty, type, color) {
        this.x = W/2 + (Math.random()-0.5)*W*0.6; this.y = H;
        this.tx = tx; this.ty = ty; this.type = type;
        this.color = color || `hsl(${Math.random()*360}, 100%, 75%)`;
        this.vy = -Math.sqrt(2 * 0.18 * (H - ty));
        this.vx = (tx - this.x) / (Math.abs(this.vy) / 0.18);
        this.dead = false;
    }
    update(dt) {
        this.vy += 0.18 * dt; 
        this.x += this.vx * dt; 
        this.y += this.vy * dt;
        if (this.vy >= 0) {
            this.dead = true;
            spawn(this.x, this.y, this.color, this.type === 'heavy' ? 350 : 130, this.type === 'heavy');
            shake = this.type === 'heavy' ? 14 : 6;
        }
    }
    draw() {
        ctx.fillStyle = "#fff"; ctx.fillRect(this.x, this.y, 2, 2);
    }
}

function startDirectorFinale() {
    const palettes = [
        ['#ff0055', '#00d2ff', '#ffffff'], // Neon
        ['#ffcc00', '#ff6600', '#ffffff'], // Fire
        ['#7700ff', '#ff00ff', '#00ffff'], // Cyber
        ['#00ff88', '#00ffcc', '#ffffff']  // Emerald
    ];
    const colors = palettes[Math.floor(Math.random() * palettes.length)];
    const pattern = ['V', 'Fan', 'Cross', 'Chaos'][Math.floor(Math.random() * 4)];
    
    let wave = 0;
    const interval = setInterval(() => {
        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                let tx;
                if (pattern === 'V') tx = i < 3 ? (W/4 + i*(W/12)) : (3*W/4 - (i-3)*(W/12));
                else if (pattern === 'Fan') tx = (W/7) * (i+1);
                else tx = Math.random() * W;
                const ty = H * (0.12 + Math.random()*0.3);
                rockets.push(new Rocket(tx, ty, Math.random() > 0.6 ? 'heavy' : 'normal', colors[i % colors.length]));
            }, i * 110);
        }
        if (++wave > 12) clearInterval(interval);
    }, 1300);
}

window.addEventListener("mousedown", (e) => {
    if (e.target.tagName === 'BUTTON') return;
    const type = (keys['ShiftLeft'] || keys['ShiftRight']) ? "burst" : (keys['Space'] ? "heavy" : "normal");
    rockets.push(new Rocket(e.clientX, e.clientY, type));
});

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = (timestamp - lastTime) / 16.66; // Normalize to 60 FPS
    lastTime = timestamp;

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    if (shake > 0) { 
        ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); 
        shake *= Math.pow(0.92, dt); 
    }

    ctx.globalCompositeOperation = 'lighter';
    
    for (let i = rockets.length - 1; i >= 0; i--) {
        rockets[i].update(dt); rockets[i].draw();
        if (rockets[i].dead) rockets.splice(i, 1);
    }

    for (let i = 0; i < POOL_SIZE; i++) {
        const p = pool[i];
        if (!p.active) continue;
        p.px = p.x; p.py = p.y;
        
        // Consistent Drag Math
        const currentDrag = Math.pow(p.drag, dt);
        p.vx *= currentDrag; 
        p.vy *= currentDrag; 
        p.vy += (p.isWillow ? 0.07 : 0.22) * dt;
        
        p.x += p.vx * dt; 
        p.y += p.vy * dt; 
        p.life -= p.decay * dt;

        if (p.life <= 0) p.active = false;
        else {
            ctx.beginPath();
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.life * (p.isWillow ? 3.5 : 2.5);
            ctx.lineCap = 'round';
            ctx.moveTo(p.px, p.py);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            
            ctx.fillStyle = "#fff";
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x - 0.5, p.y - 0.5, 1.5, 1.5);
        }
    }
    ctx.restore();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
