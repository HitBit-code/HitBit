<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timing Challenge — HitBit</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/hitbit-shared.css?v=2">
  <style>
    body {
      margin: 0;
      background: #050505;
      overflow: hidden;
    }
    #hb-game-frame {
      position: fixed;
      top: var(--hb-toolbar-height, 58px);
      left: 0;
      width: 100%;
      height: calc(100vh - var(--hb-toolbar-height, 58px));
      border: none;
      display: block;
    }
  </style>
</head>
<body data-hitbit-game="timing">
  <iframe
    id="hb-game-frame"
    src="/protected/timingchallenge/index.html"
    sandbox="allow-scripts allow-forms allow-pointer-lock allow-same-origin"
    allow="pointer-lock"
    title="Timing Challenge game"
  ></iframe>

  <script src="/assets/hitbit-shared.js?v=4"></script>
  <script>
    window.addEventListener('message', function(event) {
      if (event.origin !== window.location.origin) return;
      var msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'HB_START_SESSION') {
        window.HitBitGlobal && window.HitBitGlobal.startSession(msg.game);
      }
      if (msg.type === 'HB_SUBMIT_SCORE') {
        window.HitBitGlobal && window.HitBitGlobal.submitScore(msg.payload);
      }
    });
  </script>
</body>
</html>
